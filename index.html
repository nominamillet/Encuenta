<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Datos</title>
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .card { background: #1a6d8d; width: 350px; padding: 30px 20px; border-radius: 25px; color: white; text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .field-group { display: flex; align-items: center; margin-bottom: 15px; justify-content: space-between; }
        label { font-weight: bold; font-size: 0.85rem; width: 35%; text-align: left; }
        input, select { width: 60%; padding: 8px; border-radius: 6px; border: none; outline: none; }
        #camera-box { background: #000; width: 240px; height: 240px; margin: 20px auto; border-radius: 15px; border: 3px solid #fff; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-capture { background: #00d1b2; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; }
        .btn-capture:disabled { background: #666; }
        #msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>REGISTRO DE PERSONAL</h3>
        <div class="field-group">
            <label>NÚMERO:</label>
            <input type="text" id="numero" placeholder="Escribe o busca..." oninput="buscarPorNumero()">
        </div>
        <div class="field-group">
            <label>NOMBRE:</label>
            <select id="nombre" onchange="autoFillFromSelect()">
                <option value="">Cargando empleados...</option>
            </select>
        </div>
        <div class="field-group"><label>ALERGIAS:</label><input type="text" id="alergias"></div>
        <div class="field-group"><label>SANGRE:</label><input type="text" id="sangre"></div>

        <div id="camera-box"><video id="video" autoplay playsinline></video></div>
        <canvas id="canvas" style="display:none;"></canvas>

        <button class="btn-capture" id="btnGuardar" onclick="enviar()">GUARDAR DATOS</button>
        <div id="msg"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzgNfa9TjsHz3QatlY5i-bYl3Jd1xCzcka75yCQBK99Sd47vgGNZV15S5PgezoX3XP1/exec"; 
        let dbEmpleados = [];

        window.onload = () => {
            setupCam();
            cargarEmpleados();
        };

        async function cargarEmpleados() {
            try {
                const res = await fetch(API_URL);
                dbEmpleados = await res.json();
                const select = document.getElementById('nombre');
                select.innerHTML = '<option value="">-- Seleccionar --</option>';
                dbEmpleados.forEach(e => {
                    let opt = document.createElement('option');
                    opt.value = e.numero;
                    opt.text = e.nombre;
                    select.add(opt);
                });
            } catch(e) { document.getElementById('msg').innerText = "Error cargando lista."; }
        }

        function setupCam() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => { document.getElementById('video').srcObject = s; })
            .catch(e => { alert("Error cámara: " + e); });
        }

        function autoFillFromSelect() {
            const select = document.getElementById('nombre');
            document.getElementById('numero').value = select.value;
        }

        function buscarPorNumero() {
            const num = document.getElementById('numero').value;
            const emp = dbEmpleados.find(x => x.numero === num);
            if (emp) document.getElementById('nombre').value = emp.numero;
        }

        async function enviar() {
            const btn = document.getElementById('btnGuardar');
            const msg = document.getElementById('msg');
            const num = document.getElementById('numero').value;
            const nomSelect = document.getElementById('nombre');
            
            if(!num) return alert("Ingresa un número");
            
            btn.disabled = true;
            msg.innerText = "Procesando...";

            // ... dentro de la función enviar() ...
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');

           // Reducimos el tamaño para asegurar que Google lo acepte rápido
           canvas.width = 320; 
           canvas.height = 240;
           canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);

          // Extraemos el base64 PURO (sin el encabezado data:image/jpeg...)
           const fotoBase64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
           const payload = {
           numero: document.getElementById('numero').value,
           nombre: document.getElementById('nombre').options[document.getElementById('nombre').selectedIndex].text,
           alergias: document.getElementById('alergias').value,
           sangre: document.getElementById('sangre').value,
           foto: fotoBase64 // Aquí enviamos solo el texto de la imagen
          };
        // ... resto del fetch ...


            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.text();
                if(result === "OK") {
                    msg.style.color = "#ccffcc";
                    msg.innerText = "¡Guardado con éxito!";
                    setTimeout(() => location.reload(), 2000);
                } else { throw new Error(); }
            } catch(e) {
                msg.innerText = "Error al conectar con Google.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
