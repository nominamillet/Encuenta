<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,
initial-scale=1.0">
<title>Captura de Trabajadores</title>
<style>
body { background-color: #f0f2f5; display: flex;

justify-content: center; align-items: center; min-height: 100vh;
margin: 0; font-family: sans-serif; }

.card { background-color: #1a6d8d; width: 350px; padding:
40px 20px; border-radius: 40px; color: white; text-align: center;
box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

.field-group { display: flex; align-items: center;
margin-bottom: 12px; justify-content: space-between; }

label { font-weight: bold; font-size: 0.8rem; width: 35%;

text-align: left; }

input, select { width: 60%; padding: 6px; border-radius:

4px; border: none; }

#camera-box { background: white; width: 220px; height:
220px; margin: 20px auto; border: 4px solid #ddd; overflow: hidden;
position: relative; }

video { width: 100%; height: 100%; object-fit: cover; }

.btn-capture { background-color: #0e4b63; color: white;
border: none; padding: 10px 20px; border-radius: 8px; cursor:
pointer; font-weight: bold; box-shadow: 0 4px #052a3a; }

#msg { margin-top: 10px; font-size: 0.8rem; color: #ccffcc;

}
</style>
</head>
<body>
<div class="card">
<h2>CAPTURA DE DATOS</h2>
<div class="field-group"><label>NOMBRE:</label><select

id="nombre" onchange="autoFillNum()"><option
value="">Cargando...</option></select></div>

<div class="field-group"><label>NUMERO:</label><input

type="text" id="numero" readonly></div>

<div class="field-group"><label>ALERGIAS:</label><input

type="text" id="alergias"></div>

<div class="field-group"><label>TIPO SANGRE:</label><input

type="text" id="sangre"></div>

<div id="camera-box"><video id="video" autoplay

playsinline></video><canvas id="canvas"
style="display:none;"></canvas></div>

<button class="btn-capture" id="btnGuardar"
onclick="capturarYEnviar()">TOMAR FOTO</button>

<div id="msg"></div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzgNfa9TjsHz3QatlY5i-bYl3Jd1xCzcka75yCQBK99Sd47vgGNZV15S5PgezoX3XP1/exec";
let dbEmpleados = [];
window.onload = async () => {
setupCam();
try {
const res = await fetch(API_URL);
dbEmpleados = await res.json();
const select = document.getElementById('nombre');
select.innerHTML = '<option

value="">Seleccione...</option>';

dbEmpleados.forEach(e => {
let opt = document.createElement('option');
opt.value = e.nombre; opt.text = e.nombre;

select.add(opt);
});
} catch(e) { console.error("Error", e); }
};
function setupCam() {
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ 
        video: { width: 400, height: 400 } // Tamaño moderado para no saturar el envío
    })
    .then(s => {
        video.srcObject = s;
        video.play(); // Forzar el inicio
    })
    .catch(err => {
        console.error("No se pudo acceder a la cámara", err);
        alert("Error de cámara: " + err.name);
    });
}

function autoFillNum() {
const nameSelected =

document.getElementById('nombre').value;

const emp = dbEmpleados.find(x => x.nombre ===

nameSelected);

document.getElementById('numero').value = emp ?

emp.numero : "";
}
async function capturarYEnviar() {
const btn = document.getElementById('btnGuardar');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const payload = {
nombre: document.getElementById('nombre').value,
numero: document.getElementById('numero').value,
alergias: document.getElementById('alergias').value,
sangre: document.getElementById('sangre').value
};
if(!payload.nombre) return alert("Seleccione un

trabajador");

btn.disabled = true;
canvas.width = video.videoWidth; canvas.height =

video.videoHeight;

canvas.getContext('2d').drawImage(video, 0, 0);
payload.foto =

canvas.toDataURL('image/jpeg').split(',')[1];

try {
await fetch(API_URL, { method: 'POST', body:

JSON.stringify(payload) });

document.getElementById('msg').innerText =

"¡Guardado con éxito!";

} catch(e) { document.getElementById('msg').innerText =

"Error al guardar."; }

finally { btn.disabled = false; }
}
</script>
</body>
</html>
